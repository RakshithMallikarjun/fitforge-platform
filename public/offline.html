<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>You're offline — FitForge</title>
<meta name="theme-color" content="#059669" />
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    background: #F8FAFC;
    color: #0f172a;
    display: grid; place-items: center; padding: 24px;
  }
  .card {
    max-width: 380px; width: 100%; text-align: center;
    background: #fff; border-radius: 32px; padding: 32px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    border: 1px solid #E2E8F0;
  }
  .badge {
    width: 64px; height: 64px; border-radius: 20px; margin: 0 auto 20px;
    background: #059669; color: #fff; display: grid; place-items: center;
    font-size: 28px;
  }
  h1 { margin: 0 0 8px; font-size: 20px; letter-spacing: -0.01em; }
  p { margin: 0 0 24px; color: #64748b; font-size: 14px; line-height: 1.5; }
  button {
    appearance: none; border: 0; cursor: pointer;
    background: #059669; color: #fff; font-weight: 600; font-size: 14px;
    padding: 12px 20px; border-radius: 12px; width: 100%;
  }
  button:active { transform: scale(0.98); }
</style>
</head>
<body>
  <main class="card">
    <div class="badge">⛺</div>
    <h1>You're offline</h1>
    <p>We can't reach the gym right now. Reconnect to load fresh workouts and sync your progress.</p>
    <button onclick="location.reload()">Try again</button>
  </main>
</body>
</html>
